<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Alfalah GPT Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand-dot"></div>
        <span>Alfalah GPT</span>
      </div>
      <h2>Admin Sign In</h2>
      <p class="login-sub">Secure access to the LLMOps dashboard</p>

      <div id="error-msg" class="alert alert-error hidden"></div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autofocus placeholder="admin">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
      </form>
    </div>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
