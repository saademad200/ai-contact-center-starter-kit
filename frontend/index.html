<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfalah Investments - Demo</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        header { background-color: #003057; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; }
        .hero { padding: 4rem 2rem; text-align: center; background-color: #fff; border-bottom: 1px solid #ddd; }
        .admin-login { background-color: #f37021; color: white; padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Alfalah Investments</div>
        <nav>
            <a href="/">Home</a>
            <a href="/admin/login" class="admin-login">Admin Portal</a>
        </nav>
    </header>
    
    <div class="hero">
        <h1>Welcome to Alfalah Investments</h1>
        <p>Your trusted partner in wealth management.</p>
        <p>Need help? Try our new Alfalah GPT Assistant in the bottom right corner.</p>
    </div>

    <!-- Inject the chat widget -->
    <script src="/widget/widget.js"></script>
</body>
</html>
