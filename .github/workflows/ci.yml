name: Continuous Testing Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, release/rc]

jobs:
  unit-and-sast:
    name: Unit Tests & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r backend/requirements.txt
      - run: ruff check backend/
      - run: ruff format --check backend/
      - run: bandit -r backend/app/ -ll -q
      - name: Pytest
        env:
          ENVIRONMENT: test
          DYNAMODB_ENDPOINT_URL: ""
          OPENAI_API_KEY: sk-test-placeholder  # pragma: allowlist secret
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test  # pragma: allowlist secret
        run: cd backend && pytest tests/unit/ -v --tb=short

  e2e-playwright:
    name: E2E UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - run: cd frontend && npx playwright install --with-deps chromium
      - run: cd frontend && npx playwright test

  agent-evals:
    name: AI Agent Evaluation
    runs-on: ubuntu-latest
    # Only run on main/release branches to save OpenAI API costs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release/rc'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r backend/requirements.txt
      - name: Run Golden Dataset Eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: python backend/scripts/evaluate_agent.py
