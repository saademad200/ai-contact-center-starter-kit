name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: kms-api
  ECR_REPO_FRONTEND: kms-frontend
  ECS_CLUSTER: kms-prod-cluster
  ECS_SERVICE_API: kms-prod-api
  ECS_SERVICE_FRONTEND: kms-prod-frontend

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  # Manual approval gate — configured in GitHub repo Settings → Environments → production
  # Add required reviewers: 1 senior engineer + 1 team lead
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production   # ← this triggers the approval gate

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/kms-prod-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image (tagged with SHA + prod-latest)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPO_API:prod-latest \
            -f infrastructure/docker/Dockerfile.api .
          docker push $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_API:prod-latest

      - name: Build and push Frontend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:prod-latest \
            -f infrastructure/docker/Dockerfile.frontend .
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:prod-latest

      - name: Deploy API to ECS Production
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_API \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_API

      - name: Deploy Frontend to ECS Production
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_FRONTEND \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_FRONTEND

      - name: Health check (wait 30s then verify)
        run: |
          sleep 30
          curl -f ${{ secrets.PROD_URL }}/health || exit 1

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"✅ KMS deployed to production — commit ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"❌ KMS production deployment FAILED — commit ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
