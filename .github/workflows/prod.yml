# Production Deploy — See PROJECT_PLAN.md §12
name: Deploy to Production
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # Manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        run: |
          IMAGE_TAG=prod-${{ github.sha }}
          docker build -f infrastructure/docker/Dockerfile.api -t ${{ secrets.ECR_REPO }}:$IMAGE_TAG .
          docker build -f infrastructure/docker/Dockerfile.api -t ${{ secrets.ECR_REPO }}:prod-latest .
          docker push ${{ secrets.ECR_REPO }}:$IMAGE_TAG
          docker push ${{ secrets.ECR_REPO }}:prod-latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster acc-prod \
            --service acc-api \
            --force-new-deployment

      - name: Health Check
        run: |
          sleep 30
          curl -f http://${{ secrets.ALB_DNS }}/health || exit 1
