name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main          # production — protected, merge-only
      - release/rc    # staging / release candidate — protected, merge-only
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image:       ${{ steps.push.outputs.image }}
      ecs_cluster: ${{ steps.target.outputs.ecs_cluster }}
      ecs_service: ${{ steps.target.outputs.ecs_service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment target
        id: target
        env:
          GIT_REF: ${{ github.ref_name }}
        run: |
          if [ "$GIT_REF" = "main" ]; then
            echo "ecs_cluster=alfalah-ai-prod-cluster"      >> $GITHUB_OUTPUT
            echo "ecs_service=alfalah-ai-prod-front-svc"    >> $GITHUB_OUTPUT
            echo "ecr_repo=alfalah-ai-prod-frontend"        >> $GITHUB_OUTPUT
          else
            echo "ecs_cluster=alfalah-ai-staging-cluster"   >> $GITHUB_OUTPUT
            echo "ecs_service=alfalah-ai-staging-front-svc" >> $GITHUB_OUTPUT
            echo "ecr_repo=alfalah-ai-staging-frontend"     >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ steps.target.outputs.ecr_repo }}
          TAG:        ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$TAG -f frontend/Dockerfile ./frontend
          docker tag $REGISTRY/$REPOSITORY:$TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:$TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "image=$REGISTRY/$REPOSITORY:$TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Frontend → ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition and deploy
        env:
          IMAGE:   ${{ needs.build.outputs.image }}
          CLUSTER: ${{ needs.build.outputs.ecs_cluster }}
          SERVICE: ${{ needs.build.outputs.ecs_service }}
        run: |
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query 'taskDefinition' \
            --output json | \
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' | \
            jq --arg IMAGE "$IMAGE" \
              '(.containerDefinitions[] | select(.name == "front") | .image) |= $IMAGE')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
