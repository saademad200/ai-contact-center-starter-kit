name: Deploy to Staging

on:
  push:
    branches: [staging]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: kms-api
  ECR_REPO_FRONTEND: kms-frontend
  ECS_CLUSTER: kms-staging-cluster
  ECS_SERVICE_API: kms-staging-api
  ECS_SERVICE_FRONTEND: kms-staging-frontend

jobs:
  ci:
    uses: ./.github/workflows/ci.yml   # reuse CI job

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/kms-staging-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG \
            -f infrastructure/docker/Dockerfile.api .
          docker push $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG
          echo "API_IMAGE=$ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build and push Frontend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG \
            -f infrastructure/docker/Dockerfile.frontend .
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG

      - name: Deploy API to ECS Staging
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_API \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_API

      - name: Deploy Frontend to ECS Staging
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_FRONTEND \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_FRONTEND

      - name: Run integration smoke tests
        run: |
          cd backend
          pip install -r requirements.txt
          pytest tests/integration/ -v -m smoke \
            --base-url=${{ secrets.STAGING_URL }}
