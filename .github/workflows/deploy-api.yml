name: Deploy Backend API to ECS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-api.yml'

env:
  AWS_REGION: us-east-1                   
  ECS_CLUSTER: alfalah-ai-prod-cluster                 

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push API image to Amazon ECR
      id: build-api-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: alfalah-ai-prod-api
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the API task definition
      id: task-def-api
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: infrastructure/codedeploy/taskdef-api.json
        container-name: api
        image: ${{ steps.build-api-image.outputs.image }}

    - name: Deploy API via CodeDeploy
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-api.outputs.task-definition }}
        service: alfalah-ai-prod-api-svc
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
        codedeploy-appspec: infrastructure/codedeploy/appspec-api.yaml
        codedeploy-application: alfalah-ai-prod-api-app
        codedeploy-deployment-group: alfalah-ai-prod-api-dg
