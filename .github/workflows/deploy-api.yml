name: Deploy Backend API to ECS

on:
  push:
    branches:
      - main          # production — protected, merge-only
      - release/rc    # staging / release candidate — protected, merge-only
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy API → ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env_name=prod"                                   >> $GITHUB_OUTPUT
            echo "ecs_cluster=alfalah-ai-prod-cluster"             >> $GITHUB_OUTPUT
            echo "ecs_service=alfalah-ai-prod-api-svc"             >> $GITHUB_OUTPUT
            echo "ecr_repo=alfalah-ai-prod-api"                    >> $GITHUB_OUTPUT
          else
            echo "env_name=staging"                                >> $GITHUB_OUTPUT
            echo "ecs_cluster=alfalah-ai-staging-cluster"          >> $GITHUB_OUTPUT
            echo "ecs_service=alfalah-ai-staging-api-svc"          >> $GITHUB_OUTPUT
            echo "ecr_repo=alfalah-ai-staging-api"                 >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.target.outputs.ecr_repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Register new task definition and deploy
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
          CLUSTER: ${{ steps.target.outputs.ecs_cluster }}
          SERVICE: ${{ steps.target.outputs.ecs_service }}
        run: |
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query 'taskDefinition' \
            --output json | \
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' | \
            jq --arg IMAGE "$IMAGE" \
              '(.containerDefinitions[] | select(.name == "api") | .image) |= $IMAGE')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
