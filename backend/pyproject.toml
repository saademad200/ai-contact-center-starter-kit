[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "I", "B", "UP", "S", "ANN"]
ignore = ["ANN101", "ANN102", "ANN002", "ANN003"]

[tool.ruff.per-file-ignores]
"tests/**" = ["S101", "ANN"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["tests/"]

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
env = [
    "ENVIRONMENT=test",
    "SECRET_KEY=test-secret-key-32-bytes-minimum!",
    "DYNAMODB_ENDPOINT_URL=http://localhost:8001",
    "TABLE_USERS=kms-test-users",
    "TABLE_DOCUMENTS=kms-test-documents",
    "TABLE_CHAT_SESSIONS=kms-test-chat-sessions",
    "TABLE_CHAT_MESSAGES=kms-test-chat-messages",
    "CHROMA_HOST=localhost",
    "CHROMA_PORT=8002",
    "LLM_PROVIDER=groq",
    "GROQ_API_KEY=test-key",
    "S3_BUCKET_NAME=kms-test-bucket",
]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
