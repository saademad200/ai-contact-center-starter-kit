{% extends "base.html" %}
{% block title %}Login — Alfalah GPT Admin{% endblock %}
{% block auth_content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-dot"></div>
      <span>Alfalah GPT</span>
    </div>
    <h2>Admin Sign In</h2>
    <p class="login-sub">Secure access to the LLMOps dashboard</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autofocus placeholder="admin">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>
  </div>
</div>
{% endblock %}
